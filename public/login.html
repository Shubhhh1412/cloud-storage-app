<!DOCTYPE html>
<html>

<head>
    <title>CloudSync Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-500 to-blue-500 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-xl w-96">

        <h2 class="text-2xl font-bold text-center mb-4">Login</h2>

        <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded mb-3">

        <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded mb-3">

        <p id="msg" class="text-sm text-red-500 mb-2"></p>

        <button onclick="login()" class="w-full bg-indigo-600 text-white p-3 rounded">
            Login
        </button>

        <p class="text-center mt-3">
            <a href="signup.html">Signup</a>
        </p>

    </div>

    <script>
        async function login() {

            const email = document.getElementById("email").value
            const password = document.getElementById("password").value
            const msg = document.getElementById("msg")

            if (!email || !password) {
                msg.innerText = "Enter all fields"
                return
            }

            let res
            try {
                res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                })
            } catch (e) {
                msg.innerText = "Network error — is the server running?"
                return
            }

            if (!res.ok) {
                const errText = await res.text()
                if (errText.toLowerCase().includes("not found")) {
                    msg.innerText = "❌ No account found with that email."
                } else if (errText.toLowerCase().includes("password") || errText.toLowerCase().includes("wrong")) {
                    msg.innerText = "❌ Incorrect password. Please try again."
                } else {
                    msg.innerText = "❌ " + (errText || "Login failed. Try again.")
                }
                return
            }

            const data = await res.json()

            if (data.token) {
                localStorage.setItem("token", data.token)
                // Store password in sessionStorage so dashboard can derive encryption key
                // sessionStorage is cleared automatically when the browser tab closes
                sessionStorage.setItem("enc_pwd", password)
                window.location = "dashboard.html"
            } else {
                msg.innerText = "❌ Login failed. Please try again."
            }
        }
    </script>

</body>

</html>
